<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar uma nova conta</title>
    <link rel="stylesheet" href="./css/styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1b1d;
            /* Fundo escuro principal */
        }
    </style>
</head>

<body class="min-h-screen text-white flex flex-col lg:flex-row">

    <div class="w-full lg:w-1/2 p-8 sm:p-12 lg:p-20 flex flex-col justify-center">

        <div class="mb-10">
            <h1 class="text-4xl lg:text-5xl font-medium mb-3">
                Criar uma nova <span class="whitespace-nowrap">conta<span class="text-[#3ba68b]">.</span></span>
            </h1>
            <p class="text-gray-300 text-sm">
                Já é um membro? <a href="#" class="text-[#3ba68b] hover:underline">Entrar agora</a>
            </p>
        </div>

        <form action="#" class="space-y-6">

            <div class="grid grid-cols-1 gap-4 xl:grid-cols-2 2xl:grid-cols-3">
                <div>
                    <label class="block text-sm text-gray-200 mb-1">Nome</label>
                    <input type="text" maxlength="50"
                        class="w-full bg-[#565962] bg-opacity-70 text-white rounded-md p-3 outline-none focus:ring-2 focus:ring-[#3ba68b] transition-all">
                </div>
                <div>
                    <label class="block text-sm text-gray-200 mb-1">Sobrenome</label>
                    <input type="text" maxlength="100"
                        class="w-full bg-[#565962] bg-opacity-70 text-white rounded-md p-3 outline-none focus:ring-2 focus:ring-[#3ba68b] transition-all">
                </div>
                <div>
                    <label class="block text-sm text-gray-200 mb-1">Data de nascimento</label>
                    <input type="date" max="2026-06-30"
                        class="w-full bg-[#565962] bg-opacity-70 text-gray-300 placeholder-gray-400 rounded-md p-3 outline-none focus:ring-2 focus:ring-[#3ba68b] transition-all">
                </div>


                <div>
                    <label class="block text-sm text-gray-200 mb-1">E-mail</label>
                    <input type="email" maxlength="150" placeholder="exemplo@email.com"
                        class="w-full bg-[#565962] bg-opacity-70 text-gray-300 placeholder-gray-400 rounded-md p-3 outline-none focus:ring-2 focus:ring-[#3ba68b] transition-all">
                </div>
                <div>
                    <label class="block text-sm text-gray-200 mb-1">Telefone</label>
                    <div class="flex gap-2">
                        <input type="text" maxlength="3" value="55+"
                            class="w-16 bg-[#565962] bg-opacity-70 text-center text-white rounded-md p-3 outline-none focus:ring-2 focus:ring-[#3ba68b] transition-all">

                        <input type="text" maxlength="11" placeholder="(00) 00000-0000"
                            class="w-full bg-[#565962] bg-opacity-70 text-gray-300 placeholder-gray-400 rounded-md p-3 outline-none focus:ring-2 focus:ring-[#3ba68b] transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-sm text-gray-200 mb-1">CPF</label>
                    <input type="text" maxlength="11" placeholder="123.456.789-x"
                        class="w-full bg-[#565962] bg-opacity-70 text-gray-300 placeholder-gray-400 rounded-md p-3 outline-none focus:ring-2 focus:ring-[#3ba68b] transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm text-gray-200 mb-1">PIN</label>
                    <input type="password" maxlength="100" placeholder="********"
                        class="w-full bg-[#565962] bg-opacity-70 text-gray-300 placeholder-gray-400 rounded-md p-3 outline-none focus:ring-2 focus:ring-[#3ba68b] transition-all">
                </div>
                <div class="md:col-span-2 mt-6">
                    <div
                        class="bg-[#212526] bg-opacity-80 rounded-md p-4 text-sm text-[#3ba68b] flex flex-col gap-1 w-full md:w-3/4">
                        <span>Pelo menos 8 caracteres</span>
                        <span>Pelo menos 2 números</span>
                        <span>Pelo menos 1 caractere especial</span>
                    </div>
                </div>
            </div>

            <div class="pt-6 flex justify-center">
                <button type="button"
                    class="bg-[#3ba68b] hover:bg-[#2d856f] text-white font-medium py-3 px-10 rounded-lg transition-colors duration-200 cursor-pointer">
                    Criar conta
                </button>
            </div>

        </form>
    </div>

    <div class="hidden lg:block lg:w-1/2 relative bg-gray-900">
        <div
            class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center mix-blend-luminosity opacity-50">
        </div>
        <div class="absolute inset-0 bg-gradient-to-tr from-[#1a1b1d] via-transparent to-[#3ba68b] opacity-40"></div>
    </div>

</body>

</html>
